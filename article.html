<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>
<title>NexBrief News | Full Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #E8232A;
  --accent-dim: #B81B20;
  --accent-glow: rgba(232, 35, 42, 0.35);
  --accent-glow-lo: rgba(232, 35, 42, 0.18);
  --accent-soft: rgba(232, 35, 42, 0.12);
  --bg: #0A0A0F;
  --surface: rgba(20, 18, 25, 0.75);
  --surface-solid: #14121A;
  --surface-bright: rgba(38, 34, 46, 0.9);
  --glass-border: rgba(255, 255, 255, 0.07);
  --glass-border-hi: rgba(255, 255, 255, 0.14);
  --text: #F0EEF5;
  --sub: #8E8C95;
  --blur: 28px;
  --radius: 18px;
  --radius-sm: 12px;
}

body.light {
  --bg: #F2F0F7;
  --surface: rgba(255, 255, 255, 0.75);
  --surface-solid: #FFFFFF;
  --surface-bright: rgba(255, 255, 255, 0.95);
  --glass-border: rgba(0, 0, 0, 0.06);
  --glass-border-hi: rgba(0, 0, 0, 0.12);
  --text: #1A1A2E;
  --sub: #6B6978;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

.hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border-bottom: 1px solid var(--glass-border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  background: none; border: none; color: var(--text);
  font-size: 20px; cursor: pointer; padding: 4px;
}
.logo { font-family:'Outfit',sans-serif; font-size:20px; font-weight:900; color:var(--accent); }
.logo span { color:var(--text) }

.art-hero {
  width: 100%; height: 260px; position: relative;
  background: var(--surface-solid); overflow: hidden;
}
.art-hero img { width: 100%; height: 100%; object-fit: cover; }
.art-hero .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

.art-content { padding: 24px 16px; }
.art-tag {
  display: inline-block; background: var(--accent-soft);
  color: var(--accent); font-size: 11px; font-weight: 700;
  text-transform: uppercase; padding: 4px 10px;
  border-radius: 6px; margin-bottom: 12px;
}
.art-title {
  font-family: 'Outfit', sans-serif; font-size: 24px;
  font-weight: 800; line-height: 1.3; margin-bottom: 16px;
}
.art-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--sub); margin-bottom: 24px;
}
.art-body {
  font-size: 16px; line-height: 1.7; color: var(--text);
}
.art-body p { margin-bottom: 16px; }

.art-footer {
  margin-top: 40px; padding-top: 24px;
  border-top: 1px solid var(--glass-border);
}
.source-btn {
  display: block; width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  color: #fff; text-align: center; text-decoration: none;
  border-radius: var(--radius-sm); font-weight: 700;
  box-shadow: 0 8px 20px var(--accent-glow);
}

.bnav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background: var(--surface);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border-top:1px solid var(--glass-border);
  display:flex; height:68px; z-index:200;
}
.nvi {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; border:none; background:none; color:var(--sub);
  font-size:10px; font-weight:600; cursor:pointer;
}
.nvi-icon { font-size:20px; }

.nvi.saved { color: var(--accent); }
.nvi.saved .nvi-icon { filter: drop-shadow(0 0 10px var(--accent-glow)); }

.toast {
  position: fixed;
  left: 50%;
  bottom: 92px;
  transform: translateX(-50%) translateY(18px);
  background: var(--surface-solid);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid var(--glass-border-hi);
  box-shadow: 0 16px 40px rgba(0,0,0,0.35);
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 300;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body id="art-body">

<header class="hdr">
  <button class="back-btn" id="back-btn" aria-label="Go back">←</button>
  <div class="logo">Nex<span>Brief</span></div>
  <div style="width: 28px;"></div> <!-- Spacer -->
</header>

<div id="article-view">
  <div class="art-hero">
    <img id="art-img" src="" alt="">
    <div class="overlay"></div>
  </div>

  <div class="art-content">
    <span class="art-tag" id="art-cat">Category</span>
    <h1 class="art-title" id="art-title">Loading Article...</h1>
    
    <div class="art-meta">
      <span id="art-source">Source</span>
      <span>•</span>
      <span id="art-time">Time</span>
    </div>

    <div class="art-body" id="art-text">
      <!-- Content populated by JS -->
    </div>

    <div class="art-footer">
      <a href="#" class="source-btn" id="art-link" target="_blank">View Original Source ↗</a>
    </div>
  </div>
</div>

<nav class="bnav">
  <button class="nvi" id="home-btn"><span class="nvi-icon">🏠</span>Home</button>
  <button class="nvi" id="save-btn"><span class="nvi-icon">🔖</span>Save</button>
  <button class="nvi" id="studio-btn"><span class="nvi-icon">✨</span>Studio</button>
</nav>

<div class="toast" id="toast"></div>

<script>
  const isDark = localStorage.getItem('nb_theme') !== 'light';
  const CURRENT_ARTICLE_KEY = 'nb_current_article';
  const BOOKMARKS_KEY = 'nb_bookmarks';
  const STUDIO_DRAFT_KEY = 'nb_studio_draft';
  const STUDIO_PAGE_KEY = 'nb_pending_page';
  const STUDIO_TAB_KEY = 'nb_pending_studio_tab';
  document.body.classList.toggle('light', !isDark);

  const toastEl = document.getElementById('toast');

  function showToast(message) {
    if (!toastEl) return;
    toastEl.textContent = message;
    toastEl.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  function getStoredArticle() {
    const data = localStorage.getItem(CURRENT_ARTICLE_KEY);
    if (data) {
      try {
        return JSON.parse(data);
      } catch (err) {
        console.warn('Unable to parse stored article:', err);
      }
    }

    const params = new URLSearchParams(window.location.search);
    if (!params.toString()) return null;

    const article = {
      title: params.get('title') || '',
      summary: params.get('summary') || '',
      category: params.get('category') || 'News',
      source: params.get('source') || 'NexBrief',
      time: params.get('time') || '',
      image: params.get('image') || '',
      fallbackImage: params.get('fallbackImage') || '',
      url: params.get('url') || '#'
    };

    return article.title ? article : null;
  }

  function normalizeArticle(article) {
    return {
      title: article.title || 'Untitled story',
      summary: article.summary || 'No summary available.',
      category: article.category || 'News',
      source: article.source || 'NexBrief',
      time: article.time || '',
      image: article.image || '',
      fallbackImage: article.fallbackImage || '',
      url: article.url || '#'
    };
  }

  function getBookmarks() {
    try {
      const raw = localStorage.getItem(BOOKMARKS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (err) {
      console.warn('Unable to read bookmarks:', err);
      return [];
    }
  }

  function setBookmarks(bookmarks) {
    localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
  }

  function isSaved(article) {
    const bookmarks = getBookmarks();
    return bookmarks.some(b => b.title === article.title && b.summary === article.summary);
  }

  function updateSaveButton(article) {
    const saveBtn = document.getElementById('save-btn');
    if (!saveBtn) return;
    const saved = isSaved(article);
    saveBtn.classList.toggle('saved', saved);
    saveBtn.querySelector('.nvi-icon').textContent = saved ? '✅' : '🔖';
  }

  function goHome() {
    window.location.href = 'index.html';
  }

  function goToStudio(article) {
    localStorage.setItem(STUDIO_DRAFT_KEY, `${article.title}\n\n${article.summary}`);
    localStorage.setItem(STUDIO_PAGE_KEY, 'ai');
    localStorage.setItem(STUDIO_TAB_KEY, 'brief');
    window.location.href = 'index.html';
  }

  function loadArticle() {
    const article = getStoredArticle();
    if (!article) {
      document.getElementById('art-title').textContent = "Article not found";
      document.getElementById('art-text').innerHTML = '<p>Please return to the home feed and open a story again.</p>';
      document.getElementById('art-link').href = 'index.html';
      return;
    }

    const safeArticle = normalizeArticle(article);
    document.title = safeArticle.title + " | NexBrief News";
    document.getElementById('art-img').src = safeArticle.image || safeArticle.fallbackImage || 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360"><rect width="100%" height="100%" fill="#14121A"/><text x="50%" y="50%" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="20">NexBrief</text></svg>`);
    document.getElementById('art-img').alt = safeArticle.title;
    document.getElementById('art-cat').textContent = safeArticle.category;
    document.getElementById('art-title').textContent = safeArticle.title;
    document.getElementById('art-source').textContent = safeArticle.source || 'NexBrief';
    document.getElementById('art-time').textContent = safeArticle.time || 'Just now';
    document.getElementById('art-link').href = safeArticle.url || 'index.html';

    const contentDiv = document.getElementById('art-text');
    contentDiv.innerHTML = '';
    
    const summaryText = String(safeArticle.summary || '').trim();
    const paragraphs = summaryText ? summaryText.split('\n') : ['No summary is available for this story yet.'];
    paragraphs.forEach(p => {
      const para = document.createElement('p');
      para.textContent = p;
      contentDiv.appendChild(para);
    });

    // Add some extra placeholder text to make it look like a full article
    const placeholders = [
      "The situation continues to evolve as experts monitor the latest developments. Many are looking toward future implications for the industry and the global market.",
      "In a statement released earlier today, representatives emphasized the importance of sustainable growth and innovation in this sector.",
      "Citizens and stakeholders are encouraged to stay informed through official channels as more information becomes available in the coming days."
    ];
    
    placeholders.forEach(p => {
      const para = document.createElement('p');
      para.textContent = p;
      contentDiv.appendChild(para);
    });

    updateSaveButton(safeArticle);

    document.getElementById('save-btn').onclick = () => {
      const bookmarks = getBookmarks();
      const existingIndex = bookmarks.findIndex(b => b.title === safeArticle.title && b.summary === safeArticle.summary);
      if (existingIndex > -1) {
        bookmarks.splice(existingIndex, 1);
        setBookmarks(bookmarks);
        updateSaveButton(safeArticle);
        showToast('Removed from archive');
      } else {
        bookmarks.unshift(safeArticle);
        setBookmarks(bookmarks.slice(0, 50));
        updateSaveButton(safeArticle);
        showToast('Saved to archive');
      }
    };

    document.getElementById('studio-btn').onclick = () => goToStudio(safeArticle);
  }

  loadArticle();

  document.getElementById('back-btn').onclick = () => {
    if (document.referrer && new URL(document.referrer).origin === window.location.origin) {
      window.history.back();
      return;
    }
    goHome();
  };

  document.getElementById('home-btn').onclick = goHome;
</script>
</body>
</html>
